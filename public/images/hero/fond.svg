<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="100%" height="100%">
    <defs>
        <!-- Dégradés pour les métaux -->
        <linearGradient id="coilGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d0d5d8" />
            <stop offset="30%" stop-color="#f5f7f8" />
            <stop offset="50%" stop-color="#9ea8b0" />
            <stop offset="80%" stop-color="#6e7a85" />
            <stop offset="100%" stop-color="#4a545c" />
        </linearGradient>
        <linearGradient id="coilGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#b0b5ba" />
            <stop offset="50%" stop-color="#eef0f2" />
            <stop offset="100%" stop-color="#808a92" />
        </linearGradient>
        <linearGradient id="rebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8e9ba8" />
            <stop offset="50%" stop-color="#3a4755" />
            <stop offset="100%" stop-color="#1c2533" />
        </linearGradient>
        <linearGradient id="blueCoil" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4da6ff" />
            <stop offset="50%" stop-color="#0066cc" />
            <stop offset="100%" stop-color="#003366" />
        </linearGradient>
        <linearGradient id="redCoil" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6666" />
            <stop offset="50%" stop-color="#cc0000" />
            <stop offset="100%" stop-color="#660000" />
        </linearGradient>
        <linearGradient id="yellowCoil" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe066" />
            <stop offset="50%" stop-color="#ffcc00" />
            <stop offset="100%" stop-color="#b38600" />
        </linearGradient>
        <linearGradient id="orangeCoil" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffb366" />
            <stop offset="50%" stop-color="#ff6600" />
            <stop offset="100%" stop-color="#993d00" />
        </linearGradient>
        <linearGradient id="whiteCoil" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#cccccc" />
            <stop offset="100%" stop-color="#666666" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="5" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
        </filter>
        <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" />
        </filter>
    </defs>

    <!-- Arrière-plan (Entrepôt/Usine) -->
    <rect x="0" y="0" width="1000" height="720" fill="#2a3441" />
    
    <!-- Sol / Perspective -->
    <polygon points="0,500 1000,450 1000,720 0,720" fill="#1a212c" />
    <line x1="0" y1="550" x2="1000" y2="500" stroke="#3a4755" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="600" x2="1000" y2="550" stroke="#3a4755" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="650" x2="1000" y2="600" stroke="#3a4755" stroke-width="2" opacity="0.5"/>

    <!-- ==================== ARRIÈRE-PLAN : BARRES D'ARMATURE (REBARS) ==================== -->
    <g opacity="0.9">
        <!-- Groupe de barres supérieur droit -->
        <g>
            <path d="M 450,50 Q 600,10 850,80 L 900,130 Q 650,160 480,100 Z" fill="#4a5568" />
            <path d="M 460,60 Q 590,30 840,90 L 890,135 Q 640,170 490,110 Z" fill="#3a4755" />
            <path d="M 470,70 Q 580,50 830,100 L 880,140 Q 630,180 500,120 Z" fill="#2d3748" />
            <!-- Détails des stries sur les barres -->
            <g stroke="#718096" stroke-width="1.5" fill="none" opacity="0.6">
                <line x1="500" y1="80" x2="550" y2="95" />
                <line x1="600" y1="60" x2="650" y2="75" />
                <line x1="700" y1="55" x2="750" y2="70" />
                <line x1="800" y1="70" x2="850" y2="85" />
                <line x1="520" y1="100" x2="570" y2="115" />
                <line x1="620" y1="80" x2="670" y2="95" />
                <line x1="720" y1="75" x2="770" y2="90" />
            </g>
        </g>

        <!-- Groupe de barres central -->
        <g>
            <path d="M 380,220 Q 550,280 950,350 L 1000,400 Q 650,400 400,300 Z" fill="#5a6a7a" />
            <path d="M 390,235 Q 560,295 960,365 L 1000,410 Q 660,410 410,315 Z" fill="#4a5a6a" />
            <path d="M 400,250 Q 570,310 970,380 L 1000,420 Q 670,420 420,330 Z" fill="#3a4a5a" />
            <!-- Détails stries -->
            <g stroke="#a0aec0" stroke-width="2" fill="none" opacity="0.5">
                <line x1="450" y1="260" x2="500" y2="275" />
                <line x1="550" y1="280" x2="600" y2="295" />
                <line x1="650" y1="300" x2="700" y2="315" />
                <line x1="750" y1="320" x2="800" y2="335" />
                <line x1="850" y1="340" x2="900" y2="355" />
            </g>
        </g>

        <!-- Groupe de barres inférieur droit -->
        <g>
            <path d="M 500,380 Q 700,420 1000,480 L 1000,520 Q 750,480 520,420 Z" fill="#2d3748" />
            <path d="M 510,390 Q 710,430 1000,490 L 1000,525 Q 760,490 530,430 Z" fill="#1a202c" />
            <g stroke="#718096" stroke-width="1.5" fill="none" opacity="0.4">
                <line x1="600" y1="410" x2="650" y2="420" />
                <line x1="700" y1="430" x2="750" y2="440" />
                <line x1="800" y1="450" x2="850" y2="460" />
                <line x1="900" y1="470" x2="950" y2="480" />
            </g>
        </g>
    </g>

    <!-- ==================== BOBINE PRINCIPALE (GAUCHE) ==================== -->
    <g filter="url(#shadow)">
        <!-- Corps de la bobine -->
        <ellipse cx="160" cy="260" rx="130" ry="180" fill="url(#coilGrad1)" />
        <path d="M 160,80 Q 330,80 350,260 Q 360,440 160,440 Z" fill="url(#coilGrad2)" />
        
        <!-- Trou central -->
        <ellipse cx="155" cy="265" rx="45" ry="65" fill="#3a4755" />
        <ellipse cx="155" cy="265" rx="40" ry="60" fill="#1a202c" />
        <ellipse cx="155" cy="265" rx="30" ry="45" fill="#0d1117" />
        
        <!-- Reflets et détails sur la bobine -->
        <path d="M 120,100 Q 200,90 280,150" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.3" />
        <path d="M 100,140 Q 180,130 260,180" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2" />
        <path d="M 280,200 Q 330,260 320,350" stroke="#2d3748" stroke-width="3" fill="none" opacity="0.5" />
        <path d="M 130,400 Q 180,430 240,420" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.1" />
        
        <!-- Bordure métallique brillante -->
        <path d="M 160,80 Q 330,80 350,260 Q 360,440 160,440" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />
    </g>

    <!-- ==================== BOBINES COLORÉES (PREMIER PLAN) ==================== -->
    
    <!-- Bobine Bleue (Droite) -->
    <g>
        <ellipse cx="830" cy="570" rx="90" ry="60" fill="#1a202c" />
        <ellipse cx="830" cy="560" rx="90" ry="60" fill="url(#blueCoil)" />
        <ellipse cx="830" cy="560" rx="40" ry="25" fill="#2d3748" />
        <ellipse cx="830" cy="560" rx="30" ry="18" fill="#0d1117" />
        <path d="M 740,560 L 740,580" stroke="#ffffff" stroke-width="2" opacity="0.5" />
        <path d="M 920,560 L 920,580" stroke="#ffffff" stroke-width="2" opacity="0.5" />
        <!-- Ruban de cerclage -->
        <line x1="780" y1="510" x2="780" y2="610" stroke="#cccccc" stroke-width="4" opacity="0.8" />
        <line x1="880" y1="510" x2="880" y2="610" stroke="#cccccc" stroke-width="4" opacity="0.8" />
    </g>

    <!-- Bobine Rouge (Milieu gauche) -->
    <g>
        <ellipse cx="560" cy="530" rx="80" ry="55" fill="#1a202c" />
        <ellipse cx="560" cy="520" rx="80" ry="55" fill="url(#redCoil)" />
        <ellipse cx="560" cy="520" rx="35" ry="22" fill="#2d3748" />
        <ellipse cx="560" cy="520" rx="25" ry="15" fill="#0d1117" />
        <line x1="510" y1="475" x2="510" y2="565" stroke="#cccccc" stroke-width="3" opacity="0.8" />
        <line x1="610" y1="475" x2="610" y2="565" stroke="#cccccc" stroke-width="3" opacity="0.8" />
    </g>

    <!-- Bobine Jaune/Orange (Centre avant) -->
    <g>
        <ellipse cx="590" cy="610" rx="85" ry="60" fill="#1a202c" />
        <ellipse cx="590" cy="600" rx="85" ry="60" fill="url(#yellowCoil)" />
        <ellipse cx="590" cy="600" rx="38" ry="25" fill="#2d3748" />
        <ellipse cx="590" cy="600" rx="28" ry="18" fill="#0d1117" />
        <line x1="535" y1="550" x2="535" y2="650" stroke="#cccccc" stroke-width="4" opacity="0.8" />
        <line x1="645" y1="550" x2="645" y2="650" stroke="#cccccc" stroke-width="4" opacity="0.8" />
        <!-- Étiquette -->
        <rect x="560" y="570" width="60" height="20" fill="#ffffff" rx="3" opacity="0.8" />
        <line x1="565" y1="580" x2="615" y2="580" stroke="#333" stroke-width="2" />
    </g>

    <!-- Bobine Orange (Premier plan droite) -->
    <g>
        <ellipse cx="800" cy="650" rx="75" ry="50" fill="#1a202c" />
        <ellipse cx="800" cy="640" rx="75" ry="50" fill="url(#orangeCoil)" />
        <ellipse cx="800" cy="640" rx="32" ry="20" fill="#2d3748" />
        <ellipse cx="800" cy="640" rx="22" ry="13" fill="#0d1117" />
        <line x1="755" y1="598" x2="755" y2="682" stroke="#cccccc" stroke-width="3" opacity="0.8" />
        <line x1="845" y1="598" x2="845" y2="682" stroke="#cccccc" stroke-width="3" opacity="0.8" />
    </g>

    <!-- Bobine Blanche (Premier plan extrême gauche) -->
    <g>
        <ellipse cx="480" cy="690" rx="70" ry="40" fill="#1a202c" />
        <ellipse cx="480" cy="680" rx="70" ry="40" fill="url(#whiteCoil)" />
        <ellipse cx="480" cy="680" rx="30" ry="18" fill="#2d3748" />
        <ellipse cx="480" cy="680" rx="20" ry="12" fill="#0d1117" />
        <line x1="440" y1="648" x2="440" y2="712" stroke="#999" stroke-width="3" opacity="0.8" />
        <line x1="520" y1="648" x2="520" y2="712" stroke="#999" stroke-width="3" opacity="0.8" />
    </g>

    <!-- ==================== POUTRES MÉTALLIQUES (H-BEAMS) PREMIER PLAN GAUCHE ==================== -->
    <g opacity="0.95">
        <!-- Poutre horizontale 1 -->
        <path d="M 0,550 L 200,580 L 220,560 L 20,530 Z" fill="#718096" />
        <path d="M 0,580 L 200,610 L 220,590 L 20,560 Z" fill="#4a5568" />
        <path d="M 200,580 L 220,560 L 220,590 L 200,610 Z" fill="#2d3748" />
        <path d="M 0,550 L 20,530 L 20,560 L 0,580 Z" fill="#a0aec0" />

        <!-- Poutre horizontale 2 -->
        <path d="M 50,600 L 230,630 L 250,615 L 70,585 Z" fill="#718096" />
        <path d="M 50,625 L 230,655 L 250,640 L 70,610 Z" fill="#4a5568" />
        <path d="M 230,630 L 250,615 L 250,640 L 230,655 Z" fill="#2d3748" />
        <path d="M 50,600 L 70,585 L 70,610 L 50,625 Z" fill="#a0aec0" />

        <!-- Poutre verticale/oblique -->
        <path d="M 120,500 L 140,500 L 180,700 L 160,700 Z" fill="#718096" />
        <path d="M 140,500 L 160,500 L 200,700 L 180,700 Z" fill="#4a5568" />
        <path d="M 140,500 L 160,500 L 160,700 L 140,700 Z" fill="#2d3748" />
        <path d="M 120,500 L 140,500 L 140,700 L 120,700 Z" fill="#a0aec0" />

        <!-- Poutre supplémentaire -->
        <path d="M 180,620 L 350,660 L 360,645 L 190,605 Z" fill="#718096" />
        <path d="M 180,645 L 350,685 L 360,670 L 190,630 Z" fill="#4a5568" />
        <path d="M 350,660 L 360,645 L 360,670 L 350,685 Z" fill="#2d3748" />
    </g>

    <!-- ==================== EFFETS DE LUMIÈRE / AMBIANCE ==================== -->
    <!-- Rayons lumineux / Atmosphère industrielle -->
    <ellipse cx="300" cy="350" rx="400" ry="250" fill="#ffffff" opacity="0.02" />
    <ellipse cx="700" cy="400" rx="350" ry="200" fill="#ffffff" opacity="0.02" />
    
    <!-- Lueur sur la bobine principale -->
    <ellipse cx="200" cy="250" rx="80" ry="120" fill="#ffffff" opacity="0.05" />

    <!-- Bordure sombre pour effet vignette -->
    <rect x="0" y="0" width="1000" height="720" fill="url(#coilGrad1)" opacity="0" />
    <path d="M 0,0 L 1000,0 L 1000,720 L 0,720 Z" fill="none" stroke="#000000" stroke-width="20" opacity="0.3" />
</svg>