<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé orange -->
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A44" />
      <stop offset="100%" stop-color="#FC6076" />
    </linearGradient>
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ================= LOGO A STYLISÉ (ENCORE PLUS GRAND) ================= -->
  <!-- 
    Taille augmentée pour être très imposante
    - Hauteur : 140px
    - Largeur : 130px
  -->
  
  <!-- Contour extérieur du A (très grand) -->
  <path d="M 10,140 L 75,10 L 140,140" stroke="url(#gradOrange)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Barre transversale du A -->
  <line x1="30" y1="100" x2="120" y2="100" stroke="url(#gradOrange)" stroke-width="14" stroke-linecap="round" />
  
  <!-- Détail de la pointe du A -->
  <path d="M 75,10 L 75,60" stroke="url(#gradOrange)" stroke-width="10" stroke-linecap="round" />

  <!-- Petit texte "AE" stylisé à l'intérieur du A -->
  <text x="75" y="122" font-family="'Montserrat', Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="2">AE</text>

  <!-- ================= TEXTE ALGERIA METAL (TRÈS GRAND) ================= -->
  <text x="180" y="95" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="4" filter="url(#shadow)">
    ALGERIA METAL
  </text>

  <!-- ================= SOUS-TITRE EXPORT SOLUTIONS ================= -->
  <text x="185" y="130" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#F97316" letter-spacing="6" filter="url(#shadow)">
    EXPORT SOLUTIONS
  </text>
</svg>